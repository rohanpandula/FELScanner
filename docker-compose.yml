services:
  felscanner:
    image: rohanpandula/felscanner:radar
    build:
      context: .
      dockerfile: Dockerfile
    container_name: felscanner
    ports:
      - "5001:5000"
    volumes:
      - felscanner_data:/data
      - iptscanner_data:/data/iptscanner/data
      - iptscanner_profile:/data/iptscanner/profile
    restart: unless-stopped
    command: >
      bash -c "cd /app && 
      echo 'Container started' > /data/container.log && 
      echo 'Python version:' > /data/container.log && 
      python --version >> /data/container.log 2>&1 && 
      echo 'Attempting to start Flask app...' >> /data/container.log && 
      FLASK_DEBUG=1 FLASK_APP=app.py python -m flask run --host=0.0.0.0 --port=5000 >> /data/container.log 2>&1"
    environment:
      - TZ=${TZ:-America/New_York}
      - DATA_DIR=/data
      - PLEX_URL=${PLEX_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      - LIBRARY_NAME=${LIBRARY_NAME:-Movies}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - IPT_UID=${IPT_UID:-}
      - IPT_PASS=${IPT_PASS:-}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  felscanner_data:
    driver: local
  iptscanner_data:
    driver: local
  iptscanner_profile:
    driver: local

# Only needed if not using host network
networks:
  default:
    driver: bridge 